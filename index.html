<!DOCTYPE html>
<html lang="az">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snake Game</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
touch-action:none;
position:fixed;
user-select:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
}
#score{

position:absolute;

top:20px;
left:20px;

color:white;

font-size:28px;

}

canvas{

background:#222;

border:4px solid #00ff88;

box-shadow:0 0 20px #00ff88;

border-radius:10px;

}

</style>

</head>

<body>


<div id="score">
Score: 0
</div>


<canvas id="game" width="600" height="600"></canvas>

<script>


const canvas=document.getElementById("game");

const ctx=canvas.getContext("2d");

if(window.innerWidth < 700){

    canvas.width = 360;
    canvas.height = 360;

}

const scoreText=document.getElementById("score");


const SIZE=20;

const SPEED=2;


let snake=[

{
x:200,
y:200
}

];


let direction="RIGHT";


let apple={

x:300,
y:300

};


let score=0;

let grow=0;



document.addEventListener("keydown",function(e){


if(e.key=="ArrowUp" && direction!="DOWN")

direction="UP";


if(e.key=="ArrowDown" && direction!="UP")

direction="DOWN";


if(e.key=="ArrowLeft" && direction!="RIGHT")

direction="LEFT";


if(e.key=="ArrowRight" && direction!="LEFT")

direction="RIGHT";


});



function drawSnake(){


for(let i=0;i<snake.length;i++){


ctx.beginPath();


ctx.fillStyle=i==0 ? "#00ff88" : "#00cc66";


ctx.arc(

snake[i].x+SIZE/2,

snake[i].y+SIZE/2,

SIZE/2,

0,

Math.PI*2

);


ctx.fill();


}


}



function drawApple(){


ctx.beginPath();


ctx.fillStyle="red";


ctx.arc(

apple.x+SIZE/2,

apple.y+SIZE/2,

SIZE/2,

0,

Math.PI*2

);


ctx.fill();


}

function moveSnake(){

let head={

x:snake[0].x,

y:snake[0].y

};


if(direction=="RIGHT")
head.x+=SPEED;

if(direction=="LEFT")
head.x-=SPEED;

if(direction=="UP")
head.y-=SPEED;

if(direction=="DOWN")
head.y+=SPEED;


// divardan keçmə

if(head.x<0)
head.x=canvas.width-SIZE;

if(head.x>=canvas.width)
head.x=0;

if(head.y<0)
head.y=canvas.height-SIZE;

if(head.y>=canvas.height)
head.y=0;

for(let i=1;i<snake.length;i++){

if(
head.x==snake[i].x &&
head.y==snake[i].y
){

alert("Game Over! Score: "+score);

location.reload();

}

}

snake.unshift(head);



if(grow>0){

grow--;

}else{

snake.pop();

}

}



function eatApple(){


if(

snake[0].x < apple.x+SIZE &&

snake[0].x+SIZE > apple.x &&

snake[0].y < apple.y+SIZE &&

snake[0].y+SIZE > apple.y

){


score++;


scoreText.innerHTML="Score: "+score;


grow=3;



apple.x=Math.floor(Math.random()*30)*SIZE;

apple.y=Math.floor(Math.random()*30)*SIZE;



}


}




function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#222";

ctx.fillRect(0,0,canvas.width,canvas.height);

drawApple();

drawSnake();

}



function gameLoop(){


moveSnake();


eatApple();


draw();


requestAnimationFrame(gameLoop);


}

let startX = 0;
let startY = 0;

canvas.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", (e) => {

    let endX = e.changedTouches[0].clientX;
    let endY = e.changedTouches[0].clientY;

    let dx = endX - startX;
    let dy = endY - startY;

    if(Math.abs(dx) > Math.abs(dy)){

        if(dx > 30 && direction!="LEFT")
            direction="RIGHT";

        if(dx < -30 && direction!="RIGHT")
            direction="LEFT";

    }else{

        if(dy > 30 && direction!="UP")
            direction="DOWN";

        if(dy < -30 && direction!="DOWN")
            direction="UP";

    }

});

gameLoop();


</script>


</body>

</html>
